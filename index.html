<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet"><style>
body {margin:0;font-family:'Poppins',sans-serif;background: radial-gradient(circle at top, #1a0000, #000000);color:#fff;overflow:hidden;}
h1,h2{font-family:'Playfair Display',serif;}
.center{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;text-align:center;}
button{padding:12px 25px;border:none;border-radius:30px;background:linear-gradient(45deg,#ff0000,#ff4d6d);color:#fff;cursor:pointer;}
input{padding:12px;border-radius:20px;border:none;text-align:center;font-family:'Dancing Script',cursive;font-size:18px;}

.slider{position:relative;width:100%;height:100vh;overflow:hidden;}
.slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:opacity 1s;}
.slide.active{opacity:1;}

.overlay-text{position:absolute;bottom:20%;width:100%;text-align:center;font-size:32px;font-weight:bold;font-family:'Playfair Display',serif;text-shadow:0 0 25px rgba(0,0,0,0.9);}

.heart{position:absolute;color:red;animation: float 6s linear infinite;}
@keyframes float{0%{transform:translateY(100vh) scale(0.5);opacity:1;}100%{transform:translateY(-10vh) scale(1.5);opacity:0;}}

.message{display:none;font-size:22px;margin-top:20px;font-family:'Dancing Script',cursive;}
</style></head><body><audio id="music" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio><div class="center" id="lock">
  <h2 style="font-family:'Dancing Script',cursive;">Enter Our Special Date ❤️</h2>
  <input id="pass" placeholder="DD/MM/YYYY">
  <button onclick="unlock()">Unlock</button>
</div><div id="main" style="display:none;"><div class="slider">
  <div class="slide active" style="background-image:url('IMG-20260504-WA0014.jpg')">
    <div class="overlay-text">FROM YOUR INNOCENT SMILE ❤️</div>
  </div>  <div class="slide" style="background-image:url('Snapchat-1431499598.jpg')">
    <div class="overlay-text">TO OUR BEAUTIFUL MOMENTS TOGETHER 💖</div>
  </div>  <div class="slide" style="background-image:url('Snapchat-552333288.jpg')">
    <div class="overlay-text">YOU ARE MY FOREVER ❤️</div>
  </div>
</div><div class="center">
  <h2 style="font-family:'Dancing Script',cursive;">Enter Your Birthday 🎂</h2>
  <input type="date" id="bday">
  <button onclick="checkBday()">Submit</button>  <div class="message" id="msg">
    <span id="text"></span>
  </div>
</div></div><script>
function unlock(){
  if(document.getElementById('pass').value==='30/5/2006'){
    document.getElementById('lock').style.display='none';
    document.getElementById('main').style.display='block';
    document.getElementById('music').play();
  } else alert('Wrong ❤️');
}

let slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
  slides[i].classList.remove('active');
  i=(i+1)%slides.length;
  slides[i].classList.add('active');
},3000);

setInterval(()=>{
  let heart=document.createElement('div');
  heart.className='heart';
  heart.innerHTML='❤️';
  heart.style.left=Math.random()*100+'vw';
  heart.style.fontSize=(20+Math.random()*30)+'px';
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove();},6000);
},500);

function checkBday(){
  if(document.getElementById('bday').value==='2003-08-15'){
    document.getElementById('msg').style.display='block';
    type();
  } else alert('Try again 😜');
}

let msg="Happy Birthday ❤️ You are the most beautiful part of my life. I love you forever.";
let j=0;
function type(){
  if(j<msg.length){
    document.getElementById('text').innerHTML+=msg.charAt(j);
    j++;
    setTimeout(type,40);
  }
}
</script></body>
</html>
