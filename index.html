<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title><!-- Premium Fonts --><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a0000, #000000);
  color: #fff;
  overflow-x: hidden;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
  letter-spacing: 1px;
}

/* Smooth fade */
.fade {
  animation: fade 1.5s ease;
}
@keyframes fade {
  from {opacity:0; transform:translateY(20px);} 
  to {opacity:1; transform:translateY(0);} 
}

.center {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

button {
  padding:12px 25px;
  border-radius:30px;
  border:none;
  background: linear-gradient(45deg, #ff0000, #ff4d6d);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-top:15px;
}

input {
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

/* Slider */
.slider {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.slide {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition: opacity 1s ease-in-out;
}

.slide.active { opacity:1; }

.overlay-text {
  position:absolute;
  bottom:20%;
  width:100%;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  text-shadow:0 0 20px rgba(0,0,0,0.8);
}

/* Message box */
.message {
  display:none;
  padding:20px;
  text-align:center;
  font-size:20px;
}

.typing {
  border-right:2px solid white;
  white-space:nowrap;
  overflow:hidden;
}
</style></head><body><audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio><!-- PASSWORD --><div class="center fade" id="lock">
  <h2>Enter Our Secret ❤️</h2>
  <input id="pass" placeholder="DD/MM/YYYY">
  <button onclick="unlock()">Unlock</button>
</div><!-- MAIN --><div id="main" style="display:none;"><!-- SLIDER --><div class="slider">
  <div class="slide active" style="background-image:url('bday1.jpg')">
    <div class="overlay-text">THE DAY I MET YOU</div>
  </div>  <div class="slide" style="background-image:url('bday2.jpg')">
    <div class="overlay-text">YOU CHANGED MY WORLD</div>
  </div>  <div class="slide" style="background-image:url('child1.jpg')">
    <div class="overlay-text">MY FOREVER ❤️</div>
  </div>
</div><div class="center">
  <button onclick="playMusic()">🎵 Play Music</button>
  <button onclick="pauseMusic()">⏸ Pause</button>  <h2>Enter Your Birthday 🎂</h2>
  <input type="date" id="bday">
  <button onclick="checkBday()">Submit</button>  <div class="message" id="msg">
    <span id="text"></span>
  </div>
</div></div><script>
// Unlock
function unlock(){
  if(document.getElementById('pass').value === '30/5/2006'){
    document.getElementById('lock').style.display='none';
    document.getElementById('main').style.display='block';
  } else alert('Wrong ❤️');
}

// Music
function playMusic(){ document.getElementById('music').play(); }
function pauseMusic(){ document.getElementById('music').pause(); }

// Slider
let slides = document.querySelectorAll('.slide');
let index = 0;
setInterval(()=>{
  slides[index].classList.remove('active');
  index = (index+1)%slides.length;
  slides[index].classList.add('active');
},3000);

// Birthday
function checkBday(){
  if(document.getElementById('bday').value === '2003-08-15'){
    document.getElementById('msg').style.display='block';
    type();
  } else alert('Try again 😜');
}

// Typing
let message = "Happy Birthday ❤️ You are the most beautiful part of my life. I love you forever.";
let i=0;
function type(){
  if(i<message.length){
    document.getElementById('text').innerHTML += message.charAt(i);
    i++;
    setTimeout(type,40);
  }
}
</script></body>
</html>
